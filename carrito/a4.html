<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaperGO - Mi Carrito</title>
    <link rel="stylesheet" href="b4.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo" onclick="location.href='../logueado/a.html'">paper<span>GO</span></div>
            <div class="search-bar">
                <div class="cont-lupa"><img src="../Sin%20inicio%20de%20secion/imagenes/lupa.png" alt="lupa" class="search-icon"></div>
                <input type="text" id="input-busqueda" placeholder="Buscar productos...">
                <button id="btn-limpiar" class="btn-limpiar">X</button>
            </div>
            <ul class="nav-links">
                <li><a href="../logueado/a.html">Inicio</a></li>
                <li><a href="../logueado/a.html#productos">Productos</a></li>
                <li><a href="../nosotros/a3.html">Nosotros</a></li>
                <li><a href="../carrito/a4.html" class="cart-link">🛒 Carrito</a></li>
                <li><a href="../favoritos/a5.html" class="fav-link">❤️ Favoritos</a></li>
                <li><a href="../perfil/a6.html" class="profile-link">👤 Mi cuenta</a></li>
                <li><a href="#" id="btnCerrarSesion" class="logout-link">🚪 Cerrar sesión</a></li>
            </ul>
        </nav>
    </header>

    <main class="cart-main">
        <div class="cart-container">
            <h1 class="cart-title">Mi Carrito</h1>
            <p class="cart-subtitle">Revisa tus productos antes de comprar</p>
            <div class="cart-content">
                <div class="cart-items" id="cartItems"></div>
                <div class="cart-summary">
                    <h3>Resumen del pedido</h3>
                    <div class="summary-row"><span>Subtotal:</span><span id="subtotal">$0</span></div>
                    <div class="summary-row"><span>Envío:</span><span id="envio">$0</span></div>
                    <div class="summary-row total"><span>Total:</span><span id="total">$0</span></div>
                    <button id="btnPagar" class="btn-checkout">Proceder al pago</button>
                    <a href="../logueado/a.html#productos" class="btn-continue">Seguir comprando</a>
                </div>
            </div>
            <div id="carritoVacio" class="cart-empty" style="display: none;"><p>🛒 Tu carrito está vacío</p><a href="../logueado/a.html#productos" class="btn-continue">Ir a comprar</a></div>
        </div>
    </main>

    <footer>... (igual que antes)</footer>
    <script src="c4.js"></script>
</body>
</html>
